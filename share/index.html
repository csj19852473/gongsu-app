<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>투자 성과</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #222; }
.header { background: #1565C0; color: #fff; padding: 20px 16px; text-align: center; }
.header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.header .upd { font-size: 12px; opacity: .7; }
.content { max-width: 600px; margin: 0 auto; padding: 16px; }
.cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.card { background: #fff; border-radius: 14px; padding: 14px 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
.card .lbl { font-size: 10px; color: #888; margin-bottom: 6px; }
.card .val { font-size: 15px; font-weight: 700; color: #1565C0; }
.card .pnl { font-size: 13px; font-weight: 700; margin-top: 4px; }
.pos { color: #e53935; }
.neg { color: #1565C0; }
.sec { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
.sec h2 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.cw { position: relative; height: 200px; }
.footer { text-align: center; padding: 20px; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <h1>📈 투자 성과</h1>
  <div class="upd">마지막 업데이트: 2026-06-29 16:50</div>
</div>
<div class="content">
  <div class="cards">
    <div class="card">
      <div class="lbl">국내 자산</div>
      <div class="val">195만원</div>
      <div class="pnl pos">+0%</div>
    </div>
    <div class="card">
      <div class="lbl">미국 자산</div>
      <div class="val">6066만원</div>
      <div class="pnl pos">+22.54%</div>
    </div>
    <div class="card">
      <div class="lbl">총 자산</div>
      <div class="val">6261만원</div>
    </div>
  </div>
  <div class="sec"><h2>🇰🇷 국내 자산 추이</h2><div class="cw"><canvas id="krChart"></canvas></div></div>
  <div class="sec"><h2>🇺🇸 미국 자산 추이</h2><div class="cw"><canvas id="usChart"></canvas></div></div>
</div>
<div class="footer">비공개 투자 성과 공유 페이지</div>
<script>
function makeChart(id, labels, datasets) {
  new Chart(document.getElementById(id), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { font: { size: 11 } } } },
      scales: {
        x: { ticks: { font: { size: 10 }, maxTicksLimit: 6 } },
        y: { ticks: { font: { size: 10 }, callback: v => v + '만' } }
      }
    }
  });
}
makeChart('krChart', ["2026-06-21", "2026-06-22", "2026-06-23", "2026-06-24", "2026-06-25", "2026-06-26", "2026-06-28", "2026-06-29"], [
  { label: '실제자산(만원)', data: [198, 194, 188, 191, 191, 189, 185, 195], borderColor: '#e53935', backgroundColor: 'rgba(229,57,53,.08)', tension: .3, fill: true, pointRadius: 3 },
  { label: '투입금(만원)', data: [0, 0, 0, 0, 0, 0, 0, 0], borderColor: '#999', backgroundColor: 'transparent', borderDash: [5,4], tension: 0, pointRadius: 0 }
]);
makeChart('usChart', ["2026-06-21", "2026-06-22", "2026-06-23", "2026-06-24", "2026-06-25", "2026-06-26", "2026-06-27", "2026-06-28", "2026-06-29"], [
  { label: '미국자산(만원)', data: [6428, 6450, 6557, 6005, 5872, 6439, 6040, 6040, 6066], borderColor: '#1565C0', backgroundColor: 'rgba(21,101,192,.08)', tension: .3, fill: true, pointRadius: 3 }
]);
</script>
</body>
</html>
